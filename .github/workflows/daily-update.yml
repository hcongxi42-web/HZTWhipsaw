name: Daily Data Update

on:
  schedule:
    # 北京时间 06:00 (UTC+8) = UTC 22:00 (前一天)
    - cron: '0 22 * * *'
    # 北京时间 09:00 重试 (如果 06:00 失败)
    - cron: '0 1 * * *'
  workflow_dispatch:  # 手动触发
    inputs:
      date:
        description: '目标日期 (YYYY-MM-DD, 留空=最新)'
        required: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: |
          pip install baostock pandas numpy scipy tqdm

      - name: Fetch latest data
        run: |
          python -c "
          from data_fetcher import update_data
          update_data()
          "

      - name: Run screening for new dates
        run: |
          python batch_screen.py --latest

      - name: Slim database
        run: |
          python slim_db.py

      - name: Generate static site
        run: |
          python generate_static.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Track LFS for slim DB
          git lfs track "stock_data_slim.db"

          git add docs/ stock_data_slim.db .gitattributes
          git diff --staged --quiet || (
            git commit -m "📊 Daily update $(date +%Y-%m-%d)"
            git push
          )
