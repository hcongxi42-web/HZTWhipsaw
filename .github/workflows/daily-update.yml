name: Daily Data Update

on:
  schedule:
    # 北京时间 06:00 = UTC 22:00 (前一天)
    - cron: '0 22 * * *'
    # 北京时间 09:00 重试 = UTC 01:00
    - cron: '0 1 * * *'
    # 北京时间 14:00 兜底 = UTC 06:00
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: '目标日期 (YYYY-MM-DD, 留空=最新)'
        required: false
      rescore_all:
        description: '全量重评 (删除全部旧评分, 从头重算所有日期)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-v2-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 恢复运行时数据库 ──
      - name: Restore database from cache
        id: cache-db
        uses: actions/cache/restore@v4
        with:
          path: stock_data.db
          key: stock-db-${{ github.run_id }}
          restore-keys: |
            stock-db-

      # ── 缓存未命中 → 从种子库复制 ──
      - name: Bootstrap database if needed
        run: |
          if [ ! -f stock_data.db ]; then
            cp stock_data_seed.db stock_data.db
            echo "[bootstrap] Copied seed database"
          else
            echo "[cache] Using cached database"
          fi

      # ── 前置检测：算法是否变更 ──
      - name: Check if algorithm has changed
        id: algo-check
        run: |
          result=$(python batch_screen.py --check)
          echo "check_result=$result"
          if echo "$result" | grep -q 'CHANGED'; then
            echo "algo_changed=true" >> $GITHUB_OUTPUT
            echo "[algo-check] Algorithm CHANGED — will run rescore-all"
          else
            echo "algo_changed=false" >> $GITHUB_OUTPUT
            echo "[algo-check] Algorithm unchanged — daily incremental"
          fi

      # ── 增量拉取：始终执行（数据已是增量, 无需跳过）──
      - name: Fetch latest data
        run: |
          python -u -c "
          from data_fetcher import fetch_with_retry
          fetch_with_retry(max_attempts=2, wait_minutes=10)
          "

      # ── 评分：算法变更 → 全量重评 | 否则 → 增量 ──
      - name: Run screening
        run: |
          if [ "${{ github.event.inputs.rescore_all }}" == "true" ] || [ "${{ steps.algo-check.outputs.algo_changed }}" == "true" ]; then
            echo "[screening] Full rescore-all"
            python batch_screen.py --rescore-all
          elif [ -n "${{ github.event.inputs.date }}" ]; then
            python batch_screen.py --date ${{ github.event.inputs.date }}
          else
            python batch_screen.py --latest
          fi

      - name: Slim database (drop unused tables + keep 90 days)
        run: python slim_db.py

      - name: Refresh concept mapping (whitelist filter)
        run: python build_concept_akshare.py

      - name: Generate static site
        run: python generate_static.py

      - name: Run V5 pattern recognition
        run: python test_v5.py --latest

      - name: Generate pattern JSON
        run: python generate_patterns.py

      # ── 数据质量检查（检查 DB 实际最新日期，非今天）──
      - name: Data quality check
        run: |
          python -c "
          from data_fetcher import _get_latest_date_count
          latest_date, cnt = _get_latest_date_count()
          print(f'[quality] DB latest: {latest_date}, {cnt} stocks')
          if latest_date is None:
              print('[quality] WARNING: Database is empty!')
          elif cnt >= 4000:
              print(f'[quality] {latest_date} data complete ({cnt} stocks)')
          elif cnt >= 1000:
              print(f'[quality] {latest_date} partial data ({cnt} stocks < 4000)')
          else:
              print(f'[quality] WARNING: {latest_date} only {cnt} stocks, likely holiday/weekend')
          "

      # ── 保存精简后的数据库到 cache ──
      - name: Save database to cache
        uses: actions/cache/save@v4
        with:
          path: stock_data.db
          key: stock-db-${{ github.run_id }}

      # ── 提交并推送静态文件 ──
      - name: Commit and push static files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/
          git diff --staged --quiet || (
            git commit -m "Daily update $(date +%Y-%m-%d)"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break || sleep 10
            done
          )
