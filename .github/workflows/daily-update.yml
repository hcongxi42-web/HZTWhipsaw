name: Daily Data Update

on:
  schedule:
    # 北京时间 06:00 = UTC 22:00 (前一天)
    - cron: '0 22 * * *'
    # 北京时间 09:00 重试 = UTC 01:00
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: '目标日期 (YYYY-MM-DD, 留空=最新)'
        required: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-v2-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 恢复运行时数据库 (config.py 期望 stock_data.db) ──
      - name: Restore database from cache
        id: cache-db
        uses: actions/cache/restore@v4
        with:
          path: stock_data.db
          key: stock-db-${{ github.run_id }}
          restore-keys: |
            stock-db-

      # ── 缓存未命中 → 从种子库复制 ──
      - name: Bootstrap database if needed
        run: |
          if [ ! -f stock_data.db ]; then
            cp stock_data_seed.db stock_data.db
            echo "[bootstrap] Copied seed database (data up to June 22)"
          else
            echo "[cache] Using cached database"
          fi

      - name: Fetch latest data (incremental)
        run: |
          python -c "
          from data_fetcher import update_data
          update_data()
          "

      - name: Run screening for new dates
        run: python batch_screen.py --latest

      - name: Slim database (keep last 90 days)
        run: python slim_db.py

      # ── 保存数据库到 cache (下次运行用) ──
      - name: Save database to cache
        uses: actions/cache/save@v4
        with:
          path: stock_data.db
          key: stock-db-${{ github.run_id }}

      - name: Generate static site
        run: python generate_static.py

      # ── 只提交静态文件 ──
      - name: Commit and push static files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || (
            git commit -m "Daily update $(date +%Y-%m-%d)"
            git push
          )
