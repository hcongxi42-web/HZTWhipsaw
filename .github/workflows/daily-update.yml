name: Daily Data Update

on:
  schedule:
    # 北京时间 06:00 = UTC 22:00 (前一天)
    - cron: '0 22 * * *'
    # 北京时间 09:00 重试 = UTC 01:00
    - cron: '0 1 * * *'
    # 北京时间 14:00 兜底 = UTC 06:00
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: '目标日期 (YYYY-MM-DD, 留空=最新)'
        required: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-v2-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 恢复运行时数据库 ──
      - name: Restore database from cache
        id: cache-db
        uses: actions/cache/restore@v4
        with:
          path: stock_data.db
          key: stock-db-${{ github.run_id }}
          restore-keys: |
            stock-db-

      # ── 缓存未命中 → 从种子库复制 ──
      - name: Bootstrap database if needed
        run: |
          if [ ! -f stock_data.db ]; then
            cp stock_data_seed.db stock_data.db
            echo "[bootstrap] Copied seed database"
          else
            echo "[cache] Using cached database"
          fi

      # ── 回填：检查过去3天是否有数据缺口 ──
      - name: Backfill missing data (last 3 days)
        run: |
          python -c "
          from data_fetcher import backfill_recent_dates
          filled = backfill_recent_dates(days=3, min_stocks=1000)
          if filled:
              print(f'[backfill] 补拉了 {len(filled)} 天: {filled}')
          "

      # ── 增量拉取 + 完整性检查 + 自动重试 ──
      - name: Fetch latest data with completeness check
        run: |
          python -c "
          from data_fetcher import fetch_with_retry, backfill_recent_dates
          # 先回填再拉新
          backfill_recent_dates(days=3, min_stocks=1000)
          # 拉取最新数据并检查完整性（最多3次，间隔30分钟）
          fetch_with_retry(max_attempts=3, wait_minutes=30)
          "

      - name: Run screening for new dates
        run: python batch_screen.py --latest

      - name: Slim database (keep last 90 days)
        run: python slim_db.py

      # ── 保存数据库到 cache ──
      - name: Save database to cache
        uses: actions/cache/save@v4
        with:
          path: stock_data.db
          key: stock-db-${{ github.run_id }}

      - name: Generate static site
        run: python generate_static.py

      # ── 提交并推送静态文件 ──
      - name: Commit and push static files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || (
            git commit -m "Daily update $(date +%Y-%m-%d)"
            for i in 1 2 3; do
              git pull --rebase origin main && git push && break || sleep 10
            done
          )
