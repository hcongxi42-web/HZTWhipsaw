name: Daily Data Update

on:
  schedule:
    # 北京时间 06:00 = UTC 22:00 (前一天)
    - cron: '0 22 * * *'
    # 北京时间 09:00 重试 = UTC 01:00
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: '目标日期 (YYYY-MM-DD, 留空=最新)'
        required: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install baostock pandas numpy scipy tqdm

      # ── 从 GitHub Actions Cache 恢复精简数据库 ──
      - name: Restore slim database from cache
        id: cache-db
        uses: actions/cache/restore@v4
        with:
          path: stock_data_slim.db
          key: stock-db-${{ github.run_id }}
          restore-keys: |
            stock-db-

      - name: Fetch latest data
        run: |
          python -c "
          import os, sqlite3
          db_path = 'stock_data_slim.db'
          needs_bootstrap = True
          if os.path.exists(db_path):
              try:
                  conn = sqlite3.connect(db_path)
                  conn.execute('SELECT COUNT(*) FROM stock_daily')
                  conn.close()
                  needs_bootstrap = False
                  print('[incremental] Using cached database')
              except:
                  print('[bootstrap] Database exists but invalid, reinitializing')
                  os.remove(db_path)

          if needs_bootstrap:
              import config
              from datetime import datetime, timedelta
              config.START_DATE = (datetime.now() - timedelta(days=90)).strftime('%Y-%m-%d')
              print(f'[bootstrap] First run, fetching from {config.START_DATE}')

          from data_fetcher import update_data
          update_data()
          "

      - name: Run screening for new dates
        run: python batch_screen.py --latest

      - name: Slim database (keep last 90 days)
        run: python slim_db.py

      # ── 保存精简数据库到 cache (下次运行用) ──
      - name: Save slim database to cache
        uses: actions/cache/save@v4
        with:
          path: stock_data_slim.db
          key: stock-db-${{ github.run_id }}

      - name: Generate static site
        run: python generate_static.py

      # ── 只提交静态文件，不提交数据库 ──
      - name: Commit and push static files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || (
            git commit -m "Daily update $(date +%Y-%m-%d)"
            git push
          )
