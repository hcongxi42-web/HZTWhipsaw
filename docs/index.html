<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HZTwhipsaw &middot; 量价洗盘评分</title>
<script src="static/echarts.min.js"></script>
<link rel="stylesheet" href="static/style.css">
</head>
<body>

<header>
  <button class="menu-btn" id="menuBtn" aria-label="菜单">&#9776;</button>
  <h1>HZTwhipsaw <span class="subtitle">量价洗盘评分系统</span></h1>
  <div class="class-toggle" id="classToggle">
    <button class="class-btn active" data-class="all">全部</button>
    <button class="class-btn" data-class="trend">趋势 <span class="class-cnt" id="trendCnt">--</span></button>
    <button class="class-btn" data-class="choppy">震荡 <span class="class-cnt" id="choppyCnt">--</span></button>
  </div>
  <div class="header-stats" id="headerStats">
    <span class="stat-item">目标日期 <strong id="statDate">--</strong></span>
    <span class="stat-item">候选池 <strong id="statTotal">--</strong></span>
    <span class="stat-item">均分 <strong id="statAvg">--</strong></span>
    <span class="stat-item">最高分 <strong id="statMax">--</strong></span>
    <span class="stat-item">涨停数 <strong id="statLimit" style="color:#8B3A3A">--</strong></span>
    <span class="stat-item">数据质量 <strong id="statQuality" style="color:#5C4A3A">--</strong></span>
    <span class="stat-item">源股票 <strong id="statRaw">--</strong></span>
  </div>
</header>

<div class="tip-bar">Tips：打分不代表未来上涨，仅代表当前洗盘形态，需依据个股概念和情况进行选择</div>

<div class="main-container">
  <!-- 移动端侧栏遮罩 -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <aside class="sidebar" id="sidebar">
    <button class="sidebar-close-btn" id="sidebarCloseBtn" aria-label="关闭菜单">&times;</button>
    <div class="filter-group">
      <label>目标日期</label>
      <select id="dateSelect"><option value="">加载中...</option></select>
    </div>
    <div class="filter-group">
      <label>行业筛选</label>
      <select id="industrySelect"><option value="all">全部行业</option></select>
    </div>
    <div class="filter-group">
      <label>代码搜索</label>
      <input type="text" id="searchInput" placeholder="如 300139" autocomplete="off">
    </div>
    <div class="filter-group">
      <label>板块</label>
      <select id="boardSelect">
        <option value="all">全部板块</option>
        <option value="main">主板 (60/00)</option>
        <option value="star">科创板 (688)</option>
        <option value="chi">创业板 (300/301)</option>
        <option value="bj">北交所 (8/9)</option>
      </select>
    </div>
    <div class="filter-group">
      <label>涨停过滤</label>
      <select id="limitFilter">
        <option value="1">排除涨停股</option>
        <option value="0">包含全部</option>
      </select>
    </div>
    <div class="filter-group">
      <label>最低总分</label>
      <input type="range" id="minScore" min="0" max="85" value="0" step="5">
      <span id="minScoreLabel">&ge; 0</span>
    </div>
    <div class="filter-group">
      <label>排序维度</label>
      <select id="sortBy">
        <option value="total">综合总分</option>
        <option value="stock_strength">股票强度</option>
        <option value="washout_quality">洗盘质量</option>
        <option value="probe_test">试盘信号</option>
        <option value="ma_convergence">均线粘合</option>
        <option value="launch_readiness">启动准备</option>
        <option value="volume_price_health">量价健康</option>
      </select>
    </div>
    <div class="filter-group">
      <label>排序方向</label>
      <select id="sortOrder">
        <option value="desc">从高到低</option>
        <option value="asc">从低到高</option>
      </select>
    </div>
    <div class="filter-group" style="font-size:10px;color:var(--text-faint);margin-top:8px;">
      数据来源: baostock<br>更新: 每日 06:00 BJT
    </div>
    <div class="filter-group" style="font-size:10px;margin-top:4px;">
      <span style="color:#4A6B5A;">●</span> 完整 ≥4000
      <span style="color:#8B7A4A;margin-left:4px;">●</span> 部分
      <span style="color:#8B3A3A;margin-left:4px;">●</span> 稀疏
    </div>

    <!-- 存储监控 -->
    <div class="storage-monitor" id="storageMonitor">
      <div class="storage-title">📦 存储监控</div>
      <div class="storage-row">
        <span class="storage-label">仓库</span>
        <span class="storage-bar-bg">
          <span class="storage-bar-fill storage-bar-repo" id="storageBarRepo"></span>
        </span>
        <span class="storage-val" id="storageValRepo">--</span>
      </div>
      <div class="storage-row">
        <span class="storage-label">缓存</span>
        <span class="storage-bar-bg">
          <span class="storage-bar-fill storage-bar-cache" id="storageBarCache"></span>
        </span>
        <span class="storage-val" id="storageValCache">--</span>
      </div>
      <div class="storage-row">
        <span class="storage-label">页面</span>
        <span class="storage-bar-bg">
          <span class="storage-bar-fill storage-bar-pages" id="storageBarPages"></span>
        </span>
        <span class="storage-val" id="storageValPages">--</span>
      </div>
      <div class="storage-updated" id="storageUpdated">加载中...</div>
    </div>
  </aside>

  <main class="table-panel">
    <div class="table-wrapper">
      <table id="stockTable">
        <thead>
          <tr>
            <th class="col-rank">#</th>
            <th class="col-code">代码</th>
            <th class="col-name">名称</th>
            <th class="col-class">类别</th>
            <th class="col-score sortable active" data-sort="total">总分</th>
            <th class="col-dim sortable" data-sort="stock_strength">强度</th>
            <th class="col-dim sortable" data-sort="washout_quality">洗盘</th>
            <th class="col-dim sortable" data-sort="probe_test">试盘</th>
            <th class="col-dim sortable" data-sort="ma_convergence">均粘</th>
            <th class="col-dim sortable" data-sort="launch_readiness">启动</th>
            <th class="col-dim sortable" data-sort="volume_price_health">量价</th>
            <th class="col-probe">试盘次</th>
            <th class="col-industry">行业</th>
            <th class="col-price">收盘</th>
            <th class="col-pct">涨跌%</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="99" class="loading">加载中...</td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination" id="pagination"></div>
  </main>

  <aside class="detail-panel" id="detailPanel">
    <div class="detail-placeholder">点击左侧股票查看详情</div>
  </aside>
</div>

<script src="static/app.js"></script>
</body>
</html>
